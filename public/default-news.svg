<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="chartGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg2)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="105" x2="800" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="800" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="800" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="160" y1="0" x2="160" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="320" y1="0" x2="320" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Decorative chart area fill -->
  <polygon points="0,320 100,290 180,310 280,260 360,230 440,270 520,200 600,215 680,175 800,150 800,420 0,420"
           fill="url(#chartGrad2)"/>

  <!-- Decorative chart line -->
  <polyline points="0,320 100,290 180,310 280,260 360,230 440,270 520,200 600,215 680,175 800,150"
            fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.65"/>

  <!-- Dot indicators on chart -->
  <circle cx="280" cy="260" r="4" fill="#818cf8" opacity="0.7"/>
  <circle cx="520" cy="200" r="4" fill="#818cf8" opacity="0.7"/>
  <circle cx="800" cy="150" r="4" fill="#a5b4fc" opacity="0.7"/>

  <!-- Bar chart decorations (left side) -->
  <rect x="40" y="280" width="18" height="60" rx="3" fill="rgba(129,140,248,0.3)"/>
  <rect x="68" y="260" width="18" height="80" rx="3" fill="rgba(129,140,248,0.4)"/>
  <rect x="96" y="272" width="18" height="68" rx="3" fill="rgba(129,140,248,0.25)"/>

  <!-- Bar chart decorations (right side) -->
  <rect x="660" y="265" width="18" height="75" rx="3" fill="rgba(129,140,248,0.3)"/>
  <rect x="688" y="245" width="18" height="95" rx="3" fill="rgba(129,140,248,0.4)"/>
  <rect x="716" y="255" width="18" height="85" rx="3" fill="rgba(129,140,248,0.25)"/>

  <!-- Main text -->
  <text x="400" y="168" font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900"
        fill="white" text-anchor="middle" letter-spacing="4" opacity="0.9">MARKET</text>
  <text x="400" y="232" font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900"
        fill="white" text-anchor="middle" letter-spacing="4" opacity="0.9">NEWS</text>

  <!-- Tagline -->
  <text x="400" y="260" font-family="Arial, sans-serif" font-size="18" font-weight="400"
        fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="4">FINANCIAL UPDATES</text>
</svg>
