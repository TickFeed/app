<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#003087"/>
      <stop offset="100%" stop-color="#001a52"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4da6ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4da6ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="105" x2="800" y2="105" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="0" y1="210" x2="800" y2="210" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="0" y1="315" x2="800" y2="315" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="160" y1="0" x2="160" y2="420" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="320" y1="0" x2="320" y2="420" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="420" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="420" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Decorative chart area fill -->
  <polygon points="0,300 80,270 160,290 240,240 320,220 400,250 480,180 560,200 640,160 720,140 800,120 800,420 0,420"
           fill="url(#chartGrad)"/>

  <!-- Decorative chart line -->
  <polyline points="0,300 80,270 160,290 240,240 320,220 400,250 480,180 560,200 640,160 720,140 800,120"
            fill="none" stroke="#4da6ff" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.7"/>

  <!-- Candlestick decorations -->
  <rect x="60" y="252" width="8" height="36" rx="2" fill="rgba(74,222,128,0.5)"/>
  <line x1="64" y1="248" x2="64" y2="292" stroke="rgba(74,222,128,0.5)" stroke-width="1.5"/>
  <rect x="140" y="276" width="8" height="28" rx="2" fill="rgba(248,113,113,0.5)"/>
  <line x1="144" y1="272" x2="144" y2="308" stroke="rgba(248,113,113,0.5)" stroke-width="1.5"/>
  <rect x="220" y="232" width="8" height="32" rx="2" fill="rgba(74,222,128,0.5)"/>
  <line x1="224" y1="228" x2="224" y2="268" stroke="rgba(74,222,128,0.5)" stroke-width="1.5"/>

  <!-- NSE Logo text -->
  <text x="400" y="175" font-family="Arial Black, Arial, sans-serif" font-size="110" font-weight="900"
        fill="white" text-anchor="middle" letter-spacing="8">NSE</text>

  <!-- Subtitle -->
  <text x="400" y="218" font-family="Arial, sans-serif" font-size="22" font-weight="400"
        fill="rgba(255,255,255,0.55)" text-anchor="middle" letter-spacing="3">NATIONAL STOCK EXCHANGE</text>

  <!-- Bottom accent line -->
  <rect x="330" y="232" width="140" height="2" rx="1" fill="rgba(77,166,255,0.6)"/>
</svg>
