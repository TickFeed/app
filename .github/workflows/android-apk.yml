name: Android Build

on:
  push:
    branches: ["master"]
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "debug"
        type: choice
        options: [debug, release]

jobs:
  build:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build Next.js static export
        env:
          CAPACITOR_BUILD: "1"
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://tickfeedapi.kanishakmittal.site' }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
        run: npx next build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      # ── Debug build — runs on push to master or manual debug trigger ─────────
      - name: Build debug APK
        if: ${{ github.event_name == 'push' || github.event.inputs.build_type == 'debug' }}
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        if: ${{ github.event_name == 'push' || github.event.inputs.build_type == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: tickfeed-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      # ── Release build (signed AAB for Play Store + APK for sideload) ─────────
      - name: Decode keystore
        if: ${{ github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/') }}
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/tickfeed-release.keystore

      - name: Decode google-services.json
        if: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 != '' }}
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json

      - name: Write keystore.properties
        if: ${{ github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/') }}
        run: |
          {
            echo "storeFile=tickfeed-release.keystore"
            echo "storePassword=${{ secrets.STORE_PASSWORD }}"
            echo "keyAlias=${{ secrets.KEY_ALIAS }}"
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}"
          } > android/keystore.properties

      - name: Build release AAB (Play Store)
        if: ${{ github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/') }}
        working-directory: android
        run: ./gradlew bundleRelease

      - name: Build release APK (sideload)
        if: ${{ github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/') }}
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload release AAB
        if: ${{ github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: tickfeed-release-aab-${{ github.ref_name }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Upload release APK
        if: ${{ github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: tickfeed-release-apk-${{ github.ref_name }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      # ── Create GitHub Release on version tags ─────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
